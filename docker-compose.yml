version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: be-photobooth-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: be_photobooth
      MYSQL_USER: photobooth_user
      MYSQL_PASSWORD: Photobooth123!
    ports:
      - '3307:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-uroot', '-proot']
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: be-photobooth-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PORT: 3000
      DATABASE_URL: mysql://photobooth_user:Photobooth123!@mysql:3306/be_photobooth
    ports:
      - '3002:3000'
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npm run prisma:generate && npx prisma db push --schema prisma/schema.prisma && npm run start:dev"

volumes:
  mysql_data:
